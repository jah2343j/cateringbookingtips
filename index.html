<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>
  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      text-align: center;
    }
    canvas {
      background: black;
      margin: 10px;
    }
    button {
      margin: 5px;
      padding: 10px;
      font-size: 16px;
    }
  </style>
</head>
<body>

<h1>🎮 My Game Hub</h1>

<button onclick="showGame('snake')">Snake</button>
<button onclick="showGame('pong')">Pong</button>
<button onclick="showGame('clicker')">Clicker</button>

<div id="gameArea"></div>

<script>
function showGame(game) {
  const area = document.getElementById("gameArea");
  area.innerHTML = "";

  if (game === "snake") {
    area.innerHTML = '<canvas id="snakeGame" width="400" height="400"></canvas>';
    startSnake();
  }

  if (game === "pong") {
    area.innerHTML = '<canvas id="pongGame" width="500" height="300"></canvas>';
    startPong();
  }

  if (game === "clicker") {
    area.innerHTML = '<h2>Score: <span id="score">0</span></h2><button onclick="clickGame()">Click Me</button>';
  }
}

// CLICKER
let score = 0;
function clickGame() {
  score++;
  document.getElementById("score").innerText = score;
}

// SNAKE
function startSnake() {
  let canvas = document.getElementById("snakeGame");
  let ctx = canvas.getContext("2d");

  let snake = [{x: 200, y: 200}];
  let dx = 20, dy = 0;

  document.onkeydown = e => {
    if (e.key === "ArrowUp") { dx=0; dy=-20; }
    if (e.key === "ArrowDown") { dx=0; dy=20; }
    if (e.key === "ArrowLeft") { dx=-20; dy=0; }
    if (e.key === "ArrowRight") { dx=20; dy=0; }
  };

  function draw() {
    ctx.clearRect(0,0,400,400);
    snake.forEach(p => ctx.fillRect(p.x,p.y,20,20));

    let head = {x: snake[0].x + dx, y: snake[0].y + dy};
    snake.unshift(head);
    snake.pop();
  }

  setInterval(draw,100);
}

// PONG
function startPong() {
  let canvas = document.getElementById("pongGame");
  let ctx = canvas.getContext("2d");

  let paddleY = 100;
  let ballX = 250, ballY = 150;
  let dx = 3, dy = 3;

  document.onmousemove = e => {
    paddleY = e.clientY - canvas.offsetTop - 40;
  };

  function draw() {
    ctx.clearRect(0,0,500,300);

    // paddle
    ctx.fillRect(10, paddleY, 10, 80);

    // ball
    ctx.fillRect(ballX, ballY, 10, 10);

    ballX += dx;
    ballY += dy;

    if (ballY <= 0 || ballY >= 290) dy *= -1;
    if (ballX <= 20 && ballY > paddleY && ballY < paddleY+80) dx *= -1;
    if (ballX >= 490) dx *= -1;
  }

  setInterval(draw, 20);
}
</script>

</body>
</html>
